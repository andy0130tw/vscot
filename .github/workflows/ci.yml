name: Node.js CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Typecheck and build
      run: |
        npm run tsc
        npm run build

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: vscot
        path: dist
